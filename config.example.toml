# Copy this to config.toml and edit. config.toml is gitignored.

[search]
# Hashtags / keywords to scan on TikTok. Keep these focused so the feed stays clean.
hashtags = ["pokemongiveaway", "pokemontcggiveaway", "pokemoncardgiveaway"]
keywords = ["pokemon", "pokémon", "tcg", "booster", "charizard", "card giveaway"]
# Max posts to pull per hashtag per run.
max_posts_per_hashtag = 30
# Phrases for `giveawayinator --open-live-search`, which opens TikTok's LIVE search
# in your own (logged-in) browser so you can see who is actually streaming right now.
# TikTok gates live discovery behind login, so this hands you off rather than scraping it.
live_queries = ["pokemon giveaway", "pokemon cards", "pokemon tcg"]

[source]
# "tiktok" uses Playwright to browse public hashtag pages.
# "sample" replays bundled example posts so you can test the pipeline with no scraping.
kind = "sample"
# Run the browser headless. Set false to watch it / solve a challenge once.
headless = true
# Polite delay between page actions, in seconds.
min_delay = 2.0
max_delay = 5.0

[store]
# SQLite file used to remember which posts you've already been notified about.
path = "seen.db"

[notify]
# Any subset of: "console", "desktop", "discord", "browser", "ntfy"
# "browser" auto-opens live-candidate streams in your logged-in browser (capped per run).
# "ntfy" pushes to your phone (live giveaways are entered in the TikTok app, not desktop).
channels = ["console"]

[notify.discord]
# Only used if "discord" is in channels.
webhook_url = ""

[notify.ntfy]
# Phone push via https://ntfy.sh. Install the ntfy app and subscribe to this topic.
# Pick something unguessable: anyone who knows the topic can read and post to it.
# The notification's tap action opens @creator/live, which opens the TikTok app on a phone.
topic = ""
server = "https://ntfy.sh"
# Only push live giveaways (the kind you must enter in the app). Set false for all.
live_only = true

[filter]
# Skip posts older than this many days (0 = no limit).
max_age_days = 7
# Require at least one Pokemon keyword in the caption.
require_pokemon_keyword = true
