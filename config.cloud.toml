# Config for the cloud (Fly.io) worker. Safe to commit: it holds NO secrets.
# The Discord webhook and ntfy topic are injected at runtime from environment
# variables (Fly secrets): DISCORD_WEBHOOK_URL and NTFY_TOPIC.

[search]
hashtags = ["pokemongiveaway", "pokemontcggiveaway", "pokemoncardgiveaway"]
keywords = ["pokemon", "pokémon", "tcg", "booster", "charizard", "card giveaway"]
max_posts_per_hashtag = 30
live_queries = ["pokemon giveaway", "pokemon cards", "pokemon tcg"]

[source]
# WHATNOT mode (TikTok scraper powered down for now). Lists currently-live Pokemon shows
# via an Apify actor; the parser flags ones whose titles advertise a giveaway. To switch
# back to TikTok, set kind = "apify".
kind = "whatnot"

[source.whatnot]
actor = "devcake~whatnot-data-scraper"
token = ""  # injected from APIFY_TOKEN
keywords = ["pokemon"]
# Throttled for the free tier (~$0.005/result + base): 6 results x 2 scans/day ~= $2/mo.
max_results = 6

# Dormant TikTok config, kept so we can switch back with kind = "apify".
[source.apify]
actor = "clockworks~tiktok-scraper"
token = ""  # injected from APIFY_TOKEN
results_per_hashtag = 4
search_queries = ["pokemon giveaway", "pokemon card giveaway", "pokemon tcg giveaway"]
date_filter = "PAST_24_HOURS"
sorting = "LATEST"

[store]
# On a Fly persistent volume so dedupe survives restarts and redeploys.
path = "/data/seen.db"

[notify]
# Only the channels that make sense headless in the cloud. desktop/browser are local-only.
channels = ["console", "discord", "ntfy"]

[notify.discord]
webhook_url = ""  # injected from DISCORD_WEBHOOK_URL

[notify.ntfy]
topic = ""        # injected from NTFY_TOPIC
server = "https://ntfy.sh"
live_only = true

[filter]
max_age_days = 7
# Off for the whatnot source: the keyword search already scopes to Pokemon, and show
# titles often do not contain the word "pokemon". (Set true again for the tiktok source.)
require_pokemon_keyword = false
